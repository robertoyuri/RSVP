{% extends 'convidados/menu.html' %}
{% load static %}
{% block title %}Cadastro de Convidados{% endblock %}
{% block body %}
<br>
<div class="container">
    <form class="row g-3">
        <div class="col-12">
            <label for="nome" class="form-label">Nome Completo</label>
            <input type="text" class="form-control" id="nome" placeholder="">
        </div>
        <div class="col-md-6">
            <label for="email" class="form-label">E-mail</label>
            <input type="email" class="form-control" id="email">
        </div>
        <div class="col-md-6">
            <label for="telefone" class="form-label">Telefone</label>
            <input type="text" class="form-control" id="telefone">
        </div>
        <div class="col-12">
            <label for="Endereco" class="form-label">Endereço</label>
            <input type="text" class="form-control" id="Endereco" placeholder="Rua dos Capixabas, 229">
        </div>
        <div class="col-12">
            <label for="complemento" class="form-label">Complemento</label>
            <input type="text" class="form-control" id="complemento" placeholder="Edificio, Apartamento">
        </div>
        <div class="col-md-6">
            <label for="cidade" class="form-label">Cidade</label>
            <input type="text" class="form-control" id="cidade">
        </div>
        <div class="col-md-4">
            <label for="uf" class="form-label">UF</label>
            <select id="uf" class="form-select">
                <option selected>PA</option>
                <option>MG</option>
                <option>SC</option>
                <option>PR</option>
                <option>MS</option>
                <option>TO</option>
                <option>AC</option>
                <option>AM</option>
                <option>DF</option>
            </select>
        </div>
        <div class="col-md-2">
            <label for="cep" class="form-label">CEP</label>
            <input type="text" class="form-control" id="cep">
        </div>
        <div class="col-12">
            <label for="foto" class="form-label">Foto</label>
            <input class="form-control form-control-lg" id="foto" type="file">
        </div>
        <div class="col-12">
            <button type="submit" class="btn btn-primary">Cadastrar</button>
        </div>
    </form>
</div>
{% endblock %}
